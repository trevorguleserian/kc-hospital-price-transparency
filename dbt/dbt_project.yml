name: kc_hospital_price_transparency
version: 1.0.0
config-version: 2

profile: kc_hospital_price_transparency

model-paths: ["models"]
seed-paths: ["seeds"]
test-paths: ["tests"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

target-path: "target"
clean-targets: ["target", "dbt_packages"]

# Execution mode: bq (BigQuery, default) | local (DuckDB + lake Silver)
# silver_parquet_glob: absolute path glob for Silver Parquet (local mode). Example: C:/repo/lake/silver/standard_charges/**/*.parquet
vars:
  execution_mode: "bq"
  silver_parquet_glob: "lake/silver/standard_charges/**/*.parquet"
  # Comparable categories (is_comparable = TRUE); excludes 'other'. accepted_rate_categories in model includes 'other'.
  comparable_rate_categories: ["negotiated", "gross", "cash", "min", "max", "percentage"]

seeds:
  kc_hospital_price_transparency:
    +schema: marts

models:
  kc_hospital_price_transparency:
    +persist_docs:
      relation: true
      columns: true
    staging:
      +materialized: view
      +schema: staging
    # Path for models/staging/local/ (dot notation so dbt applies config and does not warn "unused")
    "staging.local":
      +materialized: view
      +schema: staging
    intermediate:
      +materialized: table
      +schema: intermediate
    marts:
      +materialized: table
      +schema: marts
