# SAFE TEMPLATE — no real credentials. Copy to dbt/profiles.yml and set project/dataset.
#   copy dbt/profiles.template.yml dbt/profiles.yml
# Do not commit dbt/profiles.yml (it is in .gitignore).
#
# BigQuery: set GOOGLE_APPLICATION_CREDENTIALS to your service account JSON path,
# or run "gcloud auth application-default login" and use method: oauth (omit keyfile).
# Optional env: DBT_BQ_PROJECT, DBT_BQ_DATASET.

kc_hospital_price_transparency:
  target: bigquery

  outputs:
    bigquery:
      type: bigquery
      method: service-account
      project: "{{ env_var('DBT_BQ_PROJECT', 'your-gcp-project-id') }}"
      dataset: "{{ env_var('DBT_BQ_DATASET', 'pt_analytics') }}"
      keyfile: "{{ env_var('GOOGLE_APPLICATION_CREDENTIALS') }}"
      location: "US"
      threads: 4
      timeout_seconds: 300
      priority: interactive

    local_duckdb:
      type: duckdb
      path: "../warehouse/duckdb/gold.duckdb"
      threads: 4
