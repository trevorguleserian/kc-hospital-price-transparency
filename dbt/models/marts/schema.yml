version: 2

models:
  - name: dim_hospital
    description: "One row per source_file_name in the union; full coverage so fact joins always match. Names from registries or derived from filename; use hospital_name_clean in dashboards."
    columns:
      - name: hospital_id
        description: "Stable surrogate key from hospital_name_norm; never null. May repeat across rows (same norm, different source_file_name)."
        tests:
          - not_null
      - name: hospital_name
        description: "Raw-ish name from registry preamble or derived from source_file_name."
      - name: hospital_name_clean
        description: "Human-readable name for dashboards: underscores/hyphens to spaces, collapsed spaces, trim."
        tests:
          - not_null
      - name: hospital_name_norm
        description: "Normalized for matching/dedup: lower, punctuation removed, collapsed spaces."
        tests:
          - not_null
      - name: source_system
        description: "Origin: csv_tall, csv_wide, or json (optional)."
      - name: source_file_name
        description: "One representative file for lineage (optional)."
    tests: []

  - name: dim_payer
    description: "Distinct payer_name and plan_name from union."
    columns:
      - name: payer_name
        description: "Payer name."
      - name: plan_name
        description: "Plan name."
    tests: []

  - name: dim_payer_harmonized
    description: "Payer/plan with normalized names and seed-mapped payer_family, plan_family for comparison."
    columns:
      - name: payer_name_norm
        description: "Normalized payer name (upper, trim, punctuation to space, collapse spaces, no bracket codes)."
        tests:
          - not_null
      - name: plan_name_norm
        description: "Normalized plan name (same normalization)."
        tests:
          - not_null
      - name: payer_family
        description: "Harmonized payer from seed_payer_map or payer_name_norm."
        tests:
          - not_null
      - name: plan_family
        description: "Harmonized plan from seed_plan_map or plan_name_norm."
        tests:
          - not_null
    tests: []

  - name: dim_procedure
    description: "Distinct billing_code, billing_code_type, description from union. billing_code_type inferred from code when source is UNKNOWN."
    columns:
      - name: billing_code
        description: "CPT/HCPCS/DRG or other code."
      - name: billing_code_type
        description: "Code type or system; standardized to UPPER and hyphens replaced with underscores (e.g. ICD_10_PCS, MS_DRG)."
        tests:
          # Diagnostic: run dbt run --select diag_dim_procedure_billing_code_type_unexpected and add any returned values here.
          - accepted_values:
              arguments:
                values: ['CPT', 'HCPCS', 'NDC', 'REVENUE', 'ICD_10_PCS', 'UNKNOWN', 'DRG', 'MS_DRG', 'APC', 'EAPG', 'ICD_10_CM', 'RC', 'CDM', '8', 'APR_DRG', 'ICD', 'TRIS_DRG', 'HIPPS']
      - name: description
        description: "Procedure or service description."
    tests: []

  - name: dim_procedure_harmonized
    description: "One row per (billing_code, billing_code_type) with canonical_description = most frequent non-null description across hospitals and description_variants_count."
    columns:
      - name: billing_code
        description: "CPT/HCPCS/DRG or other code."
        tests:
          - not_null
      - name: billing_code_type
        description: "Code type or system (CPT, HCPCS, NDC, REVENUE, ICD-10-PCS, or UNKNOWN)."
        tests:
          - not_null
      - name: canonical_description
        description: "Most frequent non-null description for this (billing_code, billing_code_type); fallback to dim_procedure or '(no description)'."
        tests:
          - not_null
      - name: description_variants_count
        description: "Count of distinct descriptions seen for this (billing_code, billing_code_type)."
    tests: []

  - name: fct_standard_charges
    description: "Fact table of standard charges; partitioned by ingested_at, clustered by hospital_id, billing_code, payer_name."
    columns:
      - name: standard_charge_sk
        description: "Surrogate key for the rate record."
        tests:
          - not_null
          - unique
      - name: hospital_id
        description: "Hospital identifier from dim_hospital (join on source_file_name); fallback surrogate if no match."
        tests:
          - not_null
      - name: source_system
        description: "Origin: json, csv_tall, or csv_wide."
        tests:
          - accepted_values:
              arguments:
                values: ['json', 'csv_tall', 'csv_wide']
      - name: rate_amount
        description: "Primary rate amount (numeric)."
      - name: ingested_at
        description: "When the record was ingested (partition key)."
    tests: []

  - name: fct_standard_charges_semantic
    description: "Semantic fact: one row per (standard_charge_sk, rate_category); normalized rate_amount + rate_category for BI."
    columns:
      - name: semantic_charge_sk
        description: "Surrogate key for the semantic row (standard_charge_sk + rate_category)."
        tests:
          - not_null
          - unique
      - name: standard_charge_sk
        description: "Reference to base charge record."
        tests:
          - not_null
      - name: hospital_id
        description: "Hospital identifier; join to dim_hospital."
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_hospital')
                field: hospital_id
      - name: billing_code
        description: "Procedure/service code; join to dim_procedure."
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_procedure')
                field: billing_code
      - name: rate_category
        description: "Canonical category: negotiated, gross, cash, min, max, percentage, other."
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['negotiated', 'gross', 'cash', 'min', 'max', 'percentage', 'other']
      - name: ingested_at
        description: "When the record was ingested."
        tests:
          - not_null
      - name: source_system
        description: "Origin: json, csv_tall, or csv_wide."
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['json', 'csv_tall', 'csv_wide']
    tests: []

  - name: fct_rates_comparable
    description: "All semantic rows with non-null rate_category and numeric rate_amount. rate_category normalized. is_comparable = FALSE for 'other'; comparison aggs filter to is_comparable = TRUE."
    columns:
      - name: hospital_id
        description: "Hospital identifier; join to dim_hospital."
        tests:
          - not_null
      - name: billing_code
        description: "Procedure/service code; join to dim_procedure."
        tests:
          - not_null
      - name: rate_category
        description: "Normalized (LOWER(TRIM)); accepted values include 'other' (kept for diagnostics, is_comparable = FALSE)."
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['negotiated', 'gross', 'cash', 'min', 'max', 'percentage', 'other']
      - name: rate_amount
        description: "Numeric rate; only non-null, non-zero included."
        tests:
          - not_null
      - name: is_comparable
        description: "TRUE only for categories used in hospital/payer comparisons (excludes 'other')."
        tests:
          - not_null
      - name: comparability_reason
        description: "Why comparable or not: comparable, excluded_other, excluded_unexpected_category."
        tests:
          - not_null
      - name: comparability_key
        description: "Deterministic key for like-to-like: billing_code_type|rate_category|rate_unit."
        tests:
          - not_null
    tests: []

  - name: fct_rates_comparable_harmonized
    description: "fct_rates_comparable plus payer_family, plan_family from dim_payer_harmonized."
    columns: []
    tests: []

  - name: agg_hospital_procedure_compare
    description: "Hospital-to-hospital comparison: one row per (billing_code, billing_code_type, payer_family, plan_family, rate_category, rate_unit, comparability_key, hospital_id) with min/max/approx_median rate, row_count, last_ingested_at."
    columns:
      - name: billing_code
        description: "Procedure/service code."
        tests:
          - not_null
      - name: hospital_id
        description: "Hospital identifier."
        tests:
          - not_null
      - name: rate_category
        description: "Canonical rate category (negotiated, gross, cash, etc.)."
        tests:
          - not_null
      - name: approx_median_rate
        description: "Approximate median rate_amount (BigQuery APPROX_QUANTILES(rate_amount, 100)[OFFSET(50)])."
        tests:
          - not_null
    tests: []

  - name: agg_payer_plan_compare
    description: "Payer/plan comparison: same grain as agg_hospital_procedure_compare; used to aggregate by payer_family or plan_family with filters."
    columns:
      - name: billing_code
        description: "Procedure/service code."
        tests:
          - not_null
      - name: payer_family
        description: "Harmonized payer from dim_payer_harmonized."
        tests:
          - not_null
      - name: plan_family
        description: "Harmonized plan from dim_payer_harmonized."
        tests:
          - not_null
      - name: rate_category
        description: "Canonical rate category."
        tests:
          - not_null
      - name: hospital_id
        description: "Hospital identifier."
        tests:
          - not_null
    tests: []

  - name: dim_source_file
    description: "One row per (source_file_name, source_system); registry metadata for lineage."
    columns:
      - name: source_file_name
        description: "Original file name as ingested."
      - name: source_system
        description: "json, csv_tall, or csv_wide."
      - name: hospital_name
        description: "Derived from registry preamble or file name."
      - name: ingested_at_min
        description: "Earliest ingested_at for this file."
      - name: ingested_at_max
        description: "Latest ingested_at for this file."
      - name: rows_loaded
        description: "Row count from registry."
      - name: status
        description: "Registry status (success/failed)."
      - name: delimiter
        description: "CSV delimiter when applicable."
      - name: encoding
        description: "File encoding when applicable."
      - name: header_count
        description: "CSV header column count when applicable."
    tests: []

  - name: diag_billing_code_format_issues
    description: "Diagnostic view of billing_code values that do not match the expected format for their billing_code_type (e.g. CPT exactly 5 digits, HCPCS 5 alphanumeric). Normalized for validation only (trim, upper; ICD-10-CM dot-stripped, NDC dash-stripped). Aggregated by billing_code_type, billing_code, issue_reason with row_count. CDM and UNKNOWN excluded; NDC is warning-only."
    columns:
      - name: billing_code
        description: "Original billing code from the fact."
      - name: billing_code_type
        description: "Code type (e.g. CPT, HCPCS, ICD_10_PCS)."
      - name: normalized_billing_code
        description: "Code after trim/upper and type-specific normalization for validation."
      - name: issue_reason
        description: "Reason the code failed format validation (e.g. cpt_expected_5_digits, ndc_not_10_or_11_digits)."
      - name: row_count
        description: "Number of fact rows with this (billing_code, billing_code_type, issue_reason)."
    tests: []

# Singular test: enforces billing code format by type (see dbt/tests/assert_billing_code_format_by_type.sql).
# Test fails when dim_procedure contains codes that do not match the expected structure for their billing_code_type.

  - name: diag_hospital_name_display_issues
    description: "Diagnostic: dim_hospital rows where hospital_name_clean still starts with a digit (numeric prefix). Use to verify prefix stripping."
    columns:
      - name: hospital_id
      - name: hospital_name
      - name: hospital_name_clean
      - name: source_file_name
    tests: []
